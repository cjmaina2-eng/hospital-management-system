{% extends "base.html" %}

{% block title %}Create Bill{% endblock %}

{% block content %}
<h1>Create New Bill</h1>
<form method="POST" id="billForm">
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label for="patient_id" class="form-label">Patient</label>
                <select class="form-select" id="patient_id" name="patient_id" required>
                    <option value="">Select Patient</option>
                    {% for patient in patients %}
                    <option value="{{ patient.id }}">{{ patient.user.first_name }} {{ patient.user.last_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="appointment_id" class="form-label">Appointment (optional)</label>
                <select class="form-select" id="appointment_id" name="appointment_id">
                    <option value="">None</option>
                    {% for appt in appointments %}
                    <option value="{{ appt.id }}">
                        {% if appt.appointment_date %}
                        {{ appt.appointment_date.strftime('%Y-%m-%d %H:%M') }}
                        {% else %}
                        {{ appt.appointment_date_requested.strftime('%Y-%m-%d') }} - Time pending
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="due_date" class="form-label">Due Date</label>
                <input type="date" class="form-control" id="due_date" name="due_date">
            </div>
            <div class="mb-3">
                <label for="payment_method" class="form-label">Payment Method</label>
                <select class="form-select" id="payment_method" name="payment_method">
                    <option value="Cash">Cash</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="M-Pesa">M-Pesa</option>
                    <option value="Insurance">Insurance</option>
                    <option value="Mobile Money">Mobile Money</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
            </div>
        </div>
        <div class="col-md-6">
            <h5>Line Items</h5>
            <div id="items-container">
                <div class="row item-row mb-2">
                    <div class="col-6"><input type="text" class="form-control" name="description[]" placeholder="Description" required></div>
                    <div class="col-2"><input type="number" class="form-control" name="quantity[]" placeholder="Qty" value="1" min="1" required></div>
                    <div class="col-3"><input type="number" class="form-control" name="unit_price[]" placeholder="Unit Price" step="0.01" required></div>
                    <div class="col-1"><button type="button" class="btn btn-danger remove-item">✕</button></div>
                </div>
            </div>
            <button type="button" class="btn btn-secondary" id="add-item">Add Item</button>
        </div>
    </div>
    <button type="submit" class="btn btn-primary mt-3">Create Bill</button>
    <a href="{{ url_for('billing.index') }}" class="btn btn-secondary mt-3">Cancel</a>
</form>

<script>
    document.getElementById('add-item').addEventListener('click', function() {
        const container = document.getElementById('items-container');
        const row = container.querySelector('.item-row').cloneNode(true);
        row.querySelectorAll('input').forEach(inp => inp.value = '');
        container.appendChild(row);
    });
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-item')) {
            const row = e.target.closest('.item-row');
            if (document.querySelectorAll('.item-row').length > 1) {
                row.remove();
            } else {
                alert('At least one item is required.');
            }
        }
    });
</script>
{% endblock %}
