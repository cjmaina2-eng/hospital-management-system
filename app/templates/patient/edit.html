{% extends "base.html" %}

{% block title %}Edit Patient{% endblock %}

{% block content %}
<h1>Edit Patient</h1>
<form method="POST">
    <div class="row">
        <div class="col-md-6">
            <h5>User Details</h5>
            <div class="mb-3">
                <label for="first_name" class="form-label">First Name</label>
                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}" required>
            </div>
            <div class="mb-3">
                <label for="last_name" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}" required>
            </div>
            <p><strong>Email:</strong> {{ user.email }} (cannot change)</p>
        </div>
        <div class="col-md-6">
            <h5>Patient Details</h5>
            <div class="mb-3">
                <label for="national_id" class="form-label">National ID</label>
                <input type="text" class="form-control" id="national_id" name="national_id" value="{{ patient.national_id }}" required>
            </div>
            <div class="mb-3">
                <label for="date_of_birth" class="form-label">Date of Birth</label>
                <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ patient.date_of_birth.strftime('%Y-%m-%d') }}" required>
            </div>
            <div class="mb-3">
                <label for="gender" class="form-label">Gender</label>
                <select class="form-select" id="gender" name="gender" required>
                    <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ patient.phone }}" required>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" name="address" value="{{ patient.address or '' }}">
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="city" class="form-label">City</label>
                    <input type="text" class="form-control" id="city" name="city" value="{{ patient.city or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="state" class="form-label">State</label>
                    <input type="text" class="form-control" id="state" name="state" value="{{ patient.state or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="postal_code" class="form-label">Postal Code</label>
                    <input type="text" class="form-control" id="postal_code" name="postal_code" value="{{ patient.postal_code or '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label for="blood_type" class="form-label">Blood Type</label>
                <input type="text" class="form-control" id="blood_type" name="blood_type" value="{{ patient.blood_type or '' }}">
            </div>
            <div class="mb-3">
                <label for="allergies" class="form-label">Allergies</label>
                <textarea class="form-control" id="allergies" name="allergies" rows="2">{{ patient.allergies or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="emergency_contact_name" class="form-label">Emergency Contact Name</label>
                <input type="text" class="form-control" id="emergency_contact_name" name="emergency_contact_name" value="{{ patient.emergency_contact_name or '' }}">
            </div>
            <div class="mb-3">
                <label for="emergency_contact_phone" class="form-label">Emergency Contact Phone</label>
                <input type="text" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone" value="{{ patient.emergency_contact_phone or '' }}">
            </div>
            <div class="mb-3">
                <label for="emergency_contact_relationship" class="form-label">Relationship</label>
                <input type="text" class="form-control" id="emergency_contact_relationship" name="emergency_contact_relationship" value="{{ patient.emergency_contact_relationship or '' }}">
            </div>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{{ url_for('patient.view', id=patient.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
