{% extends "base.html" %}

{% block title %}Edit Medical Record{% endblock %}

{% block content %}
<h1>Edit Medical Record #{{ record.id }}</h1>
<form method="POST">
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label for="diagnosis" class="form-label">Diagnosis</label>
                <textarea class="form-control" id="diagnosis" name="diagnosis" rows="2">{{ record.diagnosis or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="symptoms" class="form-label">Symptoms</label>
                <textarea class="form-control" id="symptoms" name="symptoms" rows="2">{{ record.symptoms or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="clinical_notes" class="form-label">Clinical Notes</label>
                <textarea class="form-control" id="clinical_notes" name="clinical_notes" rows="3">{{ record.clinical_notes or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="prescription" class="form-label">Prescription</label>
                <textarea class="form-control" id="prescription" name="prescription" rows="3">{{ record.prescription or '' }}</textarea>
            </div>
        </div>
        <div class="col-md-6">
            <div class="mb-3">
                <label for="lab_requests" class="form-label">Lab Requests</label>
                <textarea class="form-control" id="lab_requests" name="lab_requests" rows="2">{{ record.lab_requests or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="lab_results" class="form-label">Lab Results</label>
                <textarea class="form-control" id="lab_results" name="lab_results" rows="2">{{ record.lab_results or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="follow_up_notes" class="form-label">Follow-up Notes</label>
                <textarea class="form-control" id="follow_up_notes" name="follow_up_notes" rows="2">{{ record.follow_up_notes or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="Active" {% if record.status == 'Active' %}selected{% endif %}>Active</option>
                    <option value="Resolved" {% if record.status == 'Resolved' %}selected{% endif %}>Resolved</option>
                    <option value="Follow-up" {% if record.status == 'Follow-up' %}selected{% endif %}>Follow-up</option>
                </select>
            </div>
            <p><strong>Doctor:</strong> Dr. {{ record.doctor.user.first_name }} {{ record.doctor.user.last_name }}</p>
            <p><strong>Date:</strong> {{ record.date.strftime('%Y-%m-%d %H:%M') }}</p>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{{ url_for('medical.view', record_id=record.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
