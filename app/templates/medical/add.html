{% extends "base.html" %}

{% block title %}Add Medical Record{% endblock %}

{% block content %}
<h1>Add Medical Record for {{ patient.user.first_name }} {{ patient.user.last_name }}</h1>
<form method="POST">
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label for="diagnosis" class="form-label">Diagnosis</label>
                <textarea class="form-control" id="diagnosis" name="diagnosis" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="symptoms" class="form-label">Symptoms</label>
                <textarea class="form-control" id="symptoms" name="symptoms" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="clinical_notes" class="form-label">Clinical Notes</label>
                <textarea class="form-control" id="clinical_notes" name="clinical_notes" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="prescription" class="form-label">Prescription</label>
                <textarea class="form-control" id="prescription" name="prescription" rows="3" placeholder="e.g., Amoxicillin 500mg, 3x daily, 7 days"></textarea>
            </div>
        </div>
        <div class="col-md-6">
            <div class="mb-3">
                <label for="lab_requests" class="form-label">Lab Requests</label>
                <textarea class="form-control" id="lab_requests" name="lab_requests" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="lab_results" class="form-label">Lab Results</label>
                <textarea class="form-control" id="lab_results" name="lab_results" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="follow_up_notes" class="form-label">Follow-up Notes</label>
                <textarea class="form-control" id="follow_up_notes" name="follow_up_notes" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="Active">Active</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Follow-up">Follow-up</option>
                </select>
            </div>
            {% if current_user.has_role('admin') %}
            <div class="mb-3">
                <label for="doctor_id" class="form-label">Doctor</label>
                <select class="form-select" id="doctor_id" name="doctor_id" required>
                    <option value="">Select Doctor</option>
                    {% for doctor in doctors %}
                    <option value="{{ doctor.id }}">Dr. {{ doctor.user.first_name }} {{ doctor.user.last_name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div class="mb-3">
                <label for="appointment_id" class="form-label">Associated Appointment (optional)</label>
                <select class="form-select" id="appointment_id" name="appointment_id">
                    <option value="">None</option>
                    {% for appt in appointments %}
                    <option value="{{ appt.id }}">
                        {% if appt.appointment_date %}
                        {{ appt.appointment_date.strftime('%Y-%m-%d %H:%M') }}
                        {% else %}
                        {{ appt.appointment_date_requested.strftime('%Y-%m-%d') }} - Time pending
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Save Record</button>
    <a href="{{ url_for('medical.index', patient_id=patient.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
